services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-koreanlaw}
      POSTGRES_USER: ${POSTGRES_USER:-park}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-koreanlaw} -d ${POSTGRES_DB:-koreanlaw}
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - koreanlaw-net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      API_PORT: ${API_PORT:-3001}
      AUTH_PORT: ${AUTH_PORT:-3001}
      AUTH_CORS_ORIGIN: ${AUTH_CORS_ORIGIN:-http://localhost:5173}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-koreanlaw-dev-jwt-secret}
      AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER:-koreanlaw-auth}
      AUTH_JWT_AUDIENCE: ${AUTH_JWT_AUDIENCE:-koreanlaw-app}
      AUTH_JWT_TTL_SECONDS: ${AUTH_JWT_TTL_SECONDS:-604800}
      DATABASE_URL: postgresql://${POSTGRES_USER:-park}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-koreanlaw}
    ports:
      - "${AUTH_PORT:-3001}:3001"
    volumes:
      - .:/workspace
      - api_node_modules:/workspace/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - 'node --input-type=module -e "const response = await fetch(\"http://127.0.0.1:3001/health\"); process.exit(response.ok ? 0 : 1);"'
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    command: sh -lc 'if [ ! -d node_modules/pg ]; then npm install; fi && npm run dev:api'
    networks:
      - koreanlaw-net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      VITE_AUTH_BASE_URL: ${VITE_AUTH_BASE_URL:-http://localhost:3001}
    ports:
      - "${WEB_PORT:-5173}:5173"
    volumes:
      - .:/workspace
      - web_node_modules:/workspace/apps/web/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    command: sh -lc 'cd apps/web && if [ ! -x node_modules/.bin/vite ]; then npm install; fi && npm run dev -- --host 0.0.0.0'
    networks:
      - koreanlaw-net

  db-admin:
    image: adminer:4
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: nette
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - koreanlaw-net

volumes:
  postgres_data:
  api_node_modules:
  web_node_modules:

networks:
  koreanlaw-net:
    driver: bridge
